services:
    dropbot:
        container_name: dropbot-test
        env_file:
          - .env
        build:
          context: .
          dockerfile: ./Dockerfile
        tty: true
        restart: unless-stopped
        volumes:
          - /mnt/SmartMedia/Plex/Misc:/downloads
        network_mode: host
        depends_on:
          - bgutil-provider

    bgutil-provider:
        image: brainicism/bgutil-ytdlp-pot-provider
        container_name: bgutil-provider
        network_mode: host
        restart: unless-stopped
