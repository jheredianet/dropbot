services:
    dropbot:
        container_name: dropbot-test
        env_file:
          - .env
        build:
          context: .
          dockerfile: ./Dockerfile_local
        tty: true
        restart: unless-stopped
        volumes:
          - ./downloads:/downloads
        depends_on:
          - bgutil-provider

    bgutil-provider:
        image: brainicism/bgutil-ytdlp-pot-provider:latest
        container_name: bgutil-provider
        ports:
          - "4416:4416"
        restart: unless-stopped