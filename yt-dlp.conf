# yt-dlp configuration file
# This file is automatically loaded by yt-dlp

# Enable automatic download of EJS (External JS Scripts) from GitHub
# Required for YouTube downloads since yt-dlp needs to solve JavaScript challenges
# See: https://github.com/yt-dlp/yt-dlp/wiki/EJS
--remote-components ejs:github

# PO Token provider configuration for YouTube
# With network_mode: host, use localhost instead of service name
--extractor-args youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416

# Prefer MP4 format and merge to MP4
--merge-output-format mp4

# Prefer MP4 containers over WebM when available
--format-sort ext:mp4:m4a